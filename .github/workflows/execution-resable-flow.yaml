name: Website Deployment
on:
  push:
    branches:
      - main
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Git Cach Path
        id: cach-path
        run: echo "dir=node_modules" >> ${GITHUB_OUTPUT}
      - name: Cache dependencies
        id: cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.cach-path.outputs.dir }}
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
      - name: Lint code
        run: npm run lint
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Git Cach Path
        id: cach-path
        run: echo "dir=node_modules" >> ${GITHUB_OUTPUT}
      - name: Cache dependencies
        id: cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.cach-path.outputs.dir }}
          ## add runner.os
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
      - name: Test code
        id: test-code
        run: npm run test
      - name: Upload test report
        if: failure() && steps.test-code.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: test.json
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Git Cach Path
        id: cach-path
        run: echo "dir=node_modules" >> ${GITHUB_OUTPUT}
      - name: Cache dependencies
        id: cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.cach-path.outputs.dir }}
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true' 
        run: npm ci
      - name: Build website
        id: build-website
        run: npm run build
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-files
          path: dist
  deploy:
    needs: build
    uses: ./.github/workflows/reusable.yaml
    with:
        artifact-name: dist-files
  report:
    needs: [lint, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
        - name: Report Info
          run: |
            echo "Show Report..."
            echo "${{ toJSON(github) }}"

